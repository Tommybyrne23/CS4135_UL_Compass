version: "3.8"
services:
  postgres:
    image: postgres:15-alpine
    container_name: ulcompass-auth-db
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: authuser
      POSTGRES_PASSWORD: authpass
    ports:
      - "5432:5432"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: ulcompass-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"